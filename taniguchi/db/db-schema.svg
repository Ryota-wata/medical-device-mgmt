10583.27,4496.54 L10548.91,4500.54 L10583.27,4504.54 L10583.27,4636.785 A0,0 0 0 0 10583.27,4636.785 L10868.7388,4636.785 A0,0 0 0 0 10868.7388,4636.785 L10868.7388,4375.16 L10858.7388,4365.16 L10583.27,4365.16 A0,0 0 0 0 10583.27,4365.16" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M10858.7388,4365.16 L10858.7388,4375.16 L10868.7388,4375.16 L10858.7388,4365.16" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.3779" x="10589.27" y="4383.6551">Direct asset photos are projected from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.6543" x="10589.27" y="4400.0067">`application_documents` where</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.7373" x="10589.27" y="4416.3582">`owner_type='ASSET_LEDGER'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="10589.27" y="4432.7098">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="10589.27" y="4449.0614">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="10589.27" y="4465.4129">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="10589.27" y="4481.7645">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="10589.27" y="4498.1161">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="10589.27" y="4514.4676">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="10589.27" y="4530.8192">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.7388" x="10589.27" y="4547.1707">`file_path` / `content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="10589.27" y="4563.5223">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="10589.27" y="4579.8739">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="10589.27" y="4596.2254">Inherited asset photos have exactly one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.1279" x="10589.27" y="4612.577">`is_primary=true` per asset ledger when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4497" x="10589.27" y="4628.9286">at least one photo is inherited.</text></g><!--class qr_codes--><g class="entity" data-qualified-name="QR....qr_codes" data-source-line="722" id="ent0089"><rect fill="#F1F1F1" height="360.5781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="325.5508" x="30598.22" y="2561.79"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.5928" x="30732.199" y="2581.3232">qr_codes</text><line style="stroke:#181818;stroke-width:0.5;" x1="30599.22" x2="30922.7708" y1="2589.3994" y2="2589.3994"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="30604.22" y="2607.9326">*QR&#12467;&#12540;&#12489;ID / qr_code_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="30599.22" x2="30922.7708" y1="2615.00