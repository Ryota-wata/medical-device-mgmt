="13" lengthAdjust="spacing" textLength="127.1816" x="4105.5" y="1757.8076">the local print module.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.1943" x="4105.5" y="1774.1592">error_stage stores where the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.9644" x="4105.5" y="1790.5107">local print flow failed, e.g.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.4854" x="4105.5" y="1806.8623">LOCAL_MODULE_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.0654" x="4105.5" y="1823.2139">PRINTER_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.2954" x="4105.5" y="1839.5654">PRINT_REQUEST /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.0718" x="4105.5" y="1855.917">PRINT_EXECUTION</text></g><!--class qr_print_job_items--><g class="entity" data-qualified-name="QR....qr_print_job_items" data-source-line="707" id="ent0088"><rect fill="#F1F1F1" height="202.0938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="313.1094" x="3737.5" y="3999"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.1719" x="3836.4688" y="4018.5332">qr_print_job_items</text><line style="stroke:#181818;stroke-width:0.5;" x1="3738.5" x2="4049.6094" y1="4026.6094" y2="4026.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="301.1094" x="3743.5" y="4045.1426">*&#21360;&#21047;&#12472;&#12519;&#12502;&#26126;&#32048;ID / qr_print_job_item_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="3738.5" x2="4049.6094" y1="4052.2188" y2="4052.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spaci