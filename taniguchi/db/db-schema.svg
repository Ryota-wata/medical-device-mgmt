 x="4120" y="2661.9951">UNIQUE(facility_id, qr_identifier)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="343.2178" x="4120" y="2678.3467">UNIQUE(facility_id, code_prefix, code_branch, code_serial)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.0942" x="4120" y="2694.6982">code_serial is assigned as max + 1 per</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.9497" x="4120" y="2711.0498">(facility_id, code_prefix, code_branch)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0698" x="4120" y="2727.4014">in a server-side transaction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9116" x="4120" y="2743.7529">data matching confirm resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.4497" x="4120" y="2760.1045">(facility_id, qr_identifier) and updates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.7324" x="4120" y="2776.4561">qr_codes.asset_ledger_id in same tx</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.3125" x="4120" y="2792.8076">label_template_key refers to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.9961" x="4120" y="2809.1592">frontend-fixed Tepra Creator templates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.9834" x="4120" y="2825.5107">latest print operator is resolved via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="4120" y="2841.8623">last_print_job_id -&gt; qr_print_jobs.requested_by_user_id</text></g><!--cl