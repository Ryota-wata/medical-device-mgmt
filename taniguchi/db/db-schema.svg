0 0 0 0 23102.5,3964" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M23377.9688,3964 L23377.9688,3974 L23387.9688,3974 L23377.9688,3964" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.3779" x="23108.5" y="3982.4951">Direct asset photos are projected from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.6543" x="23108.5" y="3998.8467">`application_documents` where</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.7373" x="23108.5" y="4015.1982">`owner_type='ASSET_LEDGER'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="23108.5" y="4031.5498">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="23108.5" y="4047.9014">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="23108.5" y="4064.2529">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="23108.5" y="4080.6045">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="23108.5" y="4096.9561">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="23108.5" y="4113.3076">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="23108.5" y="4129.6592">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.7388" x="23108.5" y="4146.0107">`file_path` / `content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="23108.5" y="4162.3623">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="23108.5" y="4178.7139">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="23108.5" y="4195.0654">Inherited asset photos have exactly one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.1279" x="23108.5" y="4211.417">`is_primary=true` per asset ledger when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4497" x="23108.5" y="4227.7686">at least one photo is inherited.</text></g><!--class qr_codes--><g class="entity" data-qualified-name="QR....qr_codes" data-source-line="635" id="ent0080"><rect fill="#F1F1F1" height="360.5781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="325.5508" x="15366" y="2566"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.5928" x="15499.979" y="2585.5332">qr_codes</text><line style="stroke:#181818;stroke-width:0.5;" x1="15367" x2="15690.5508" y1="2593.6094" y2="2593.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="15372" y="2612.1426">*QR&#12467;&#12540;&#12489;ID / qr_code_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="15367" x2="15690.5508" y1="2619.2188" y2="2619.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.6543" x="15372" y="2637.752">&#36039;&#29987;&#21488;&#24115;ID / asset_ledger_id : bigint</text><text fill="#000000" font-family="sans-serif