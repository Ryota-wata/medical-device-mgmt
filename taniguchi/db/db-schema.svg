char</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="270.7646" x="18040" y="2849.0645">&#26368;&#32066;&#21360;&#21047;&#12472;&#12519;&#12502;ID / last_print_job_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="234.1787" x="18040" y="2866.6738">&#26368;&#32066;&#21360;&#21047;&#26085;&#26178; / printed_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.0684" x="18040" y="2884.2832">&#20316;&#25104;&#26085;&#26178; / created_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.9785" x="18040" y="2901.8926">&#26356;&#26032;&#26085;&#26178; / updated_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.3027" x="18040" y="2919.502">&#21066;&#38500;&#26085;&#26178; / deleted_at : timestamp</text></g><g class="entity" data-qualified-name="QR....GMN85" data-source-line="677" id="ent0086"><path d="M18395,2643.5 L18395,2743 L18360.08,2747 L18395,2751 L18395,2849.7188 A0,0 0 0 0 18395,2849.7188 L18759.2178,2849.7188 A0,0 0 0 0 18759.2178,2849.7188 L18759.2178,2653.5 L18749.2178,2643.5 L18395,2643.5 A0,0 0 0 0 18395,2643.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M18749.2178,2643.5 L18749.2178,2653.5 L18759.2178,2653.5 L18749.2178,2643.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.8335" x="18401" y="2661.9951">UNIQUE(facility_id, qr_identifier)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="343.2178" x="18401" y="2678.3467">UNIQUE(facility_id, code_prefix, code_branch, code_serial)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.0942" x="18401" y="2694.6982">code_serial is assigned as max + 1 per</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.9497" x="18401" y="2711.0498">(facility_id, code_prefix, code_branch)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0698" x="18401" y="2727.4014">in a server-side transaction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9116" x="18401" y="2743.7529">data matching confirm resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.4497" x="18401" y="2760.1045">(facility_id, qr_identifier) and updates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.7324" x="18401" y="2776.4561">qr_codes.asset_ledger_id in same tx</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.3125" x="18401" y="2792.8076">label_template_key refers to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.9961" x="18401" y="2809.1592">frontend-fixed Tepra Creator templates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.9834" x="18401" y="2825.5107">latest print operator is resolved via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="18401" y="2841.8623">last_print_job_id -&gt; qr_print_jobs.requested_by_user_id</text></g><!--class qr_print_jobs--><g class="entity" data-qualified-name="QR....qr_print_jobs" data-source-line="691" id="ent0088"><rect fill="#F1F1F1" height="342.9688" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="330.2402" x="18018" y="1564.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="