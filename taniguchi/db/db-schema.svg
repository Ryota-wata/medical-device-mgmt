ze="14" lengthAdjust="spacing" textLength="235.7305" x="23127.5" y="4352.7988">&#20195;&#34920;&#20889;&#30495;&#12501;&#12521;&#12464; / is_primary : boolean</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.9307" x="23127.5" y="4370.4082">&#34920;&#31034;&#38918; / sort_order : int</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.0684" x="23127.5" y="4388.0176">&#20316;&#25104;&#26085;&#26178; / created_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.9785" x="23127.5" y="4405.627">&#26356;&#26032;&#26085;&#26178; / updated_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.3027" x="23127.5" y="4423.2363">&#21066;&#38500;&#26085;&#26178; / deleted_at : timestamp</text></g><g class="entity" data-qualified-name=".....GMN83" data-source-line="643" id="ent0084"><path d="M23447.5,4175.5 L23447.5,4308 L23412.91,4312 L23447.5,4316 L23447.5,4447.125 A0,0 0 0 0 23447.5,4447.125 L23732.9688,4447.125 A0,0 0 0 0 23732.9688,4447.125 L23732.9688,4185.5 L23722.9688,4175.5 L23447.5,4175.5 A0,0 0 0 0 23447.5,4175.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M23722.9688,4175.5 L23722.9688,4185.5 L23732.9688,4185.5 L23722.9688,4175.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.3779" x="23453.5" y="4193.9951">Direct asset photos are projected from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.6543" x="23453.5" y="4210.3467">`application_documents` where</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.7373" x="23453.5" y="4226.6982">`owner_type='ASSET_LEDGER'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="23453.5" y="4243.0498">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="23453.5" y="4259.4014">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="23453.5" y="4275.7529">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="23453.5" y="4292.1045">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="23453.5" y="4308.4561">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="23453.5" y="4324.8076">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="23453.5" y="4341.1592">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.7388" x="23453.5" y="4357.5107">`file_path` / `content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="23453.5" y="4373.8623">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="23453.5" y="4390.2139">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="23453.5" y="4406.5654">Inherited asset photos have exactly one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.1279" x="23453.5" y="4422.917">`is_primary=true` per asset ledger when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4497" x="23453.5" y="4439.2686">at least one photo is inherited.</text></g><!--class qr_codes--><g class="entity" data-qualified-name="QR....qr_codes" data-source-line="664" id="ent0087"><rect fill="#F1F1F1" height="360.5781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="325.5508" x="26288" y="2566"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.5928" x="26421.979" y="2585.5332">qr_codes</text><line style="stroke:#181818;stroke-width:0.5;" x1="26289" x2="26612.5508" y1="2593.6094" y2="2593.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="26294" y="2612.1426">*QR&#12467;&#12540;&#12489;ID / qr_code_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="26289" x2="26612.5508" y1="2619.2188" y2="2619.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.6543" x="26294" y="2637.752">&#36039;&#29987;&#21488;&#24115;ID / asset_ledger_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="26294" y="2655.3613">&#26045;&#35373;ID / facility_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.1719" x="26294" y="2672.9707">QR&#35672;&#21029;&#23376; / qr_identifier : varchar</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.0615" x="26294" y="2690.5801">&#12467;&#12540;&#12489;&#12503;&#12524;&#12501;&#12451;&#12483;&#12463;&#12473; / code_prefix : char(1)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="268.4199" x="26294" y="2708.1895">&#12467;&#12540;&#12489;&#26525;&#30058;&#65288;