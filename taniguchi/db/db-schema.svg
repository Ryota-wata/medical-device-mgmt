l="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.9644" x="18389.5" y="1790.5107">local print flow failed, e.g.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.4854" x="18389.5" y="1806.8623">LOCAL_MODULE_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.0654" x="18389.5" y="1823.2139">PRINTER_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.2954" x="18389.5" y="1839.5654">PRINT_REQUEST /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.0718" x="18389.5" y="1855.917">PRINT_EXECUTION</text></g><!--class qr_print_job_items--><g class="entity" data-qualified-name="QR....qr_print_job_items" data-source-line="730" id="ent0092"><rect fill="#F1F1F1" height="202.0938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="313.1094" x="18020.5" y="4210.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.1719" x="18119.4688" y="4230.0332">qr_print_job_items</text><line style="stroke:#181818;stroke-width:0.5;" x1="18021.5" x2="18332.6094" y1="4238.1094" y2="4238.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="301.1094" x="18026.5" y="4256.6426">*&#21360;&#21047;&#12472;&#12519;&#12502;&#26126;&#32048;ID / qr_print_job_item_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="18021.5" x2="18332.6094" y1="4263.7188" y2="4263.7188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.4268" x="18026.5" y="4282.252">&#21360;&#21047;&#12472;&#12519;&#12502;ID / qr_print_job_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.082" x="18026.5" y="4299.8613">QR&#12467