34;&#38918; / sort_order : int</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.0684" x="29358.49" y="5087.9976">&#20316;&#25104;&#26085;&#26178; / created_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.9785" x="29358.49" y="5105.607">&#26356;&#26032;&#26085;&#26178; / updated_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.3027" x="29358.49" y="5123.2163">&#21066;&#38500;&#26085;&#26178; / deleted_at : timestamp</text></g><g class="entity" data-qualified-name=".....GMN95" data-source-line="823" id="ent0096"><path d="M29678.42,4867.65 L29678.42,5007.95 L29644.06,5011.95 L29678.42,5015.95 L29678.42,5155.6266 A0,0 0 0 0 29678.42,5155.6266 L29963.8888,5155.6266 A0,0 0 0 0 29963.8888,5155.6266 L29963.8888,4877.65 L29953.8888,4867.65 L29678.42,4867.65 A0,0 0 0 0 29678.42,4867.65" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M29953.8888,4867.65 L29953.8888,4877.65 L29963.8888,4877.65 L29953.8888,4867.65" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.3779" x="29684.42" y="4886.1451">Direct asset photos are projected from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.6543" x="29684.42" y="4902.4967">`application_documents` where</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.7373" x="29684.42" y="4918.8482">`owner_type='ASSET_LEDGER'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="29684.42" y="4935.1998">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="29684.42" y="4951.5514">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="29684.42" y="4967.9029">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="29684.42" y="4984.2545">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="29684.42" y="5000.6061">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="29684.42" y="5016.9576">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="29684.42" y="5033.3092">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.4961" x="29684.42" y="5049.6607">S3 object key in `file_path` and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0952" x="29684.42" y="5066.0123">`content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="29684.42" y="5082.3639">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="29684.42" y="5098.7154">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="29684.42" y="5115.067">Inherited asset photos have exactly one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.1279" x="29684.42" y="5131.4186">`is_primary=true` per asset ledger when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4497" x="29684.42" y="5147.7701">at least one photo is inherited.</text></g><!--class qr_codes--><g class="entity" data-qualified-name="QR....qr_codes" data-source-line="845" id="ent0099"><rect fill="#F1F1F1" height="360.5781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="325.5508" x="34973.38" y="2817.12"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.5928" x="35107.359" y="2836.6532">qr_codes</text><line style="stroke:#181818;stroke-width:0.5;" x1="34974.38" x2="35297.9308" y1="2844.7294" y2="2844.7294"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="34979.38" y="2863.2626">*QR&#12467;&#12540;&#12489;ID / qr_code_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="34974.38" x2="35297.9308" y1="2870.3388" y2="2870.3388"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.6543" x="34979.38" y="2888.872">&#36039;&#29987;&#21488;&#24115;ID / asset_ledger_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="34979.38" y="2906.4813">&#26045;&#35373;ID / facility_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.1719" x="34979.38" y="2924.0907">QR&#35672;&#21029;&#23376; / qr_identifier : varchar</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.0615" x="34979.38" y="2941.7001">&#12467;&#12540;&#12489;&#12503;&#12524;&#12501;&#12451;&#12483;&#12463;&#12473; / code_prefix : char(1)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="268.4199" x="34979.38" y="2959.3095">&#12467;&#12540;&#12489;&#26525;&#30058;&#65288;2&#26689;&#65289; / code_branch : char(2)</text><text fill="#000000" font-