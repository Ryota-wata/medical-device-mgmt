00" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9116" x="26655" y="2743.7529">data matching confirm resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.4497" x="26655" y="2760.1045">(facility_id, qr_identifier) and updates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.7324" x="26655" y="2776.4561">qr_codes.asset_ledger_id in same tx</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.3125" x="26655" y="2792.8076">label_template_key refers to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.9961" x="26655" y="2809.1592">frontend-fixed Tepra Creator templates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.9834" x="26655" y="2825.5107">latest print operator is resolved via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="26655" y="2841.8623">last_print_job_id -&gt; qr_print_jobs.requested_by_user_id</text></g><!--class qr_print_jobs--><g class="entity" data-qualified-name="QR....qr_print_jobs" data-source-line="701" id="ent0091"><rect fill="#F1F1F1" height="342.9688" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="330.2402" x="26251" y="1564.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="80.9375" x="26375.6514" y="1584.0332">qr_print_jobs</text><line style="stroke:#181818;stroke-width:0.5;" x1="26252" x2="26580.2402" y1="1592.1094" y2="1592.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="238.875" x="26257" y="1610.6426">*&#21360;&#21047;&#12472;&#12519;&#12502;ID / qr_print_job_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="26252" x2="2658