facility_id, client_request_id)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.5615" x="26622.5" y="1643.3467">request_payload_hash stores</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.7808" x="26622.5" y="1659.6982">the normalized print-start</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.897" x="26622.5" y="1676.0498">request payload hash used for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.7598" x="26622.5" y="1692.4014">idempotent replay comparison.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.4243" x="26622.5" y="1708.7529">started_at is recorded when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.8652" x="26622.5" y="1725.1045">print-start acceptance completes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.9561" x="26622.5" y="1741.4561">and the client can hand off to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.1816" x="26622.5" y="1757.8076">the local print module.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.1943" x="26622.5" y="1774.1592">error_stage stores where the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.9644" x="26622.5" y="1790.5107">local print flow failed, e.g.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.4854" x="26622.5" y="1806.8623">LOCAL_MODULE_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.0654" x="26622.5" y="1823.2139">PRIN