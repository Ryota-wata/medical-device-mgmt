pacing" textLength="160.4243" x="30932.47" y="1697.7429">started_at is recorded when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.8652" x="30932.47" y="1714.0945">print-start acceptance completes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.9561" x="30932.47" y="1730.4461">and the client can hand off to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.1816" x="30932.47" y="1746.7976">the local print module.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.1943" x="30932.47" y="1763.1492">error_stage stores where the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.9644" x="30932.47" y="1779.5007">local print flow failed, e.g.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.4854" x="30932.47" y="1795.8523">LOCAL_MODULE_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.0654" x="30932.47" y="1812.2039">PRINTER_INIT /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.2954" x="30932.47" y="1828.5554">PRINT_REQUEST /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.0718" x="30932.47" y="1844.907">PRINT_EXECUTION</text></g><!--class qr_print_job_items--><g class="entity" data-qualified-name="QR....qr_print_job_items" data-source-line="798" id="ent0097"><rect fill="#F1F1F1" height="202.0938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="313.1094" x="30584.45" y="4399.92"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.1719" x="30683.4188" y="4419.4532">qr_print_job_items</text><line sty