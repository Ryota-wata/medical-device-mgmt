t-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="29485.42" y="4935.1998">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="29485.42" y="4951.5514">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="29485.42" y="4967.9029">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="29485.42" y="4984.2545">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="29485.42" y="5000.6061">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="29485.42" y="5016.9576">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="29485.42" y="5033.3092">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.4961" x="29485.42" y="5049.6607">S3 object key in `file_path` and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0952" x="29485.42" y="5066.0123">`content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="29485.42" y="5082.3639">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="29485.42" y="5098.7154">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="29485.42" y="5115.067">Inherited a