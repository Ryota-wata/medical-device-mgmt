"spacing" textLength="220.3779" x="28691.5" y="4193.9951">Direct asset photos are projected from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.6543" x="28691.5" y="4210.3467">`application_documents` where</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.7373" x="28691.5" y="4226.6982">`owner_type='ASSET_LEDGER'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.9209" x="28691.5" y="4243.0498">and `document_category='PHOTO'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0361" x="28691.5" y="4259.4014">and `deleted_at IS NULL`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.2852" x="28691.5" y="4275.7529">Data matching confirm copies survey photo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.8145" x="28691.5" y="4292.1045">metadata from</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.3027" x="28691.5" y="4308.4561">`owner_type='ASSET_SURVEY_RECORD'`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.1289" x="28691.5" y="4324.8076">records to `ASSET_LEDGER` records for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1816" x="28691.5" y="4341.1592">created `asset_ledgers`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.7388" x="28691.5" y="4357.5107">`file_path` / `content_hash` are reused;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.5679" x="28691.5" y="4373.8623">the binary object is not duplicated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4688" x="28691.5" y="4390.2139">`survey_record_id` keeps source provenance.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.0933" x="28691.5" y="4406.5654">Inherited asset photos have exactly one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.1279" x="28691.5" y="4422.917">`is_primary=true` per asset ledger when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.4497" x="28691.5" y="4439.2686">at least one photo is inherited.</text></g><!--class qr_codes--><g class="entity" data-qualified-name="QR....qr_codes" data-source-line="654" id="ent0084"><rect fill="#F1F1F1" height="360.5781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="325.5508" x="18034" y="2566"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.5928" x="18167.979" y="2585.5332">qr_codes</text><line style="stroke:#181818;stroke-width:0.5;" x1="18035" x2="18358.5508" y1="2593.6094" y2="2593.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="18040" y="2612.1426">*QR&#12467;&#12540;&#12489;ID / qr_code_id : bigint</text><line style="stroke:#181818;stroke-width:1;" x1="18035" x2="18358.5508" y1="2619.2188" y2="2619.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.6543" x="18040" y="2637.752">&#36039;&#29987;&#21488;&#24115;ID / asset_ledger_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="18040" y="2655.3613">&#26045;&#35373;ID / facility_id : bigint</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.1719" x="18040" y="2672.9707">QR&#35672;&#21029;&#2337